name: frontend-ci

on:
  pull_request:
    paths:
      - 'projects/bx-hive-frontend/**'
      - 'projects/bx-hive-contracts/smart_contracts/artifacts/**'
      - '.github/**'
  push:
    branches: [main, dev]
    paths:
      - 'projects/bx-hive-frontend/**'
      - 'projects/bx-hive-contracts/smart_contracts/artifacts/**'
      - '.github/**'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: projects/bx-hive-frontend

jobs:
  checks:
    # Fast PR validation — runs on every relevant PR.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-frontend
      - name: Lint
        run: pnpm run lint
      - name: Format
        run: pnpm run format:check
      - name: Build
        run: pnpm run build
      - name: Unit tests
        run: pnpm run test:run

  integration:
    # Integration suite — only on PRs to main/dev or push to main/dev.
    needs: checks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push'
      || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-frontend
      - uses: ./.github/actions/setup-localnet

      - name: Seed .env from template
        run: cp .env.template .env

      - name: Integration tests
        run: pnpm run test:integration

  e2e:
    # E2E suite — only on PRs to main/dev or push to main/dev. Runs in parallel with integration.
    needs: checks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push'
      || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev'))
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-frontend
      - uses: ./.github/actions/setup-localnet

      - name: Seed .env from template
        run: cp .env.template .env

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('projects/bx-hive-frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 3
        run: pnpm exec playwright install-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: projects/bx-hive-frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: projects/bx-hive-frontend/test-results/
          retention-days: 7